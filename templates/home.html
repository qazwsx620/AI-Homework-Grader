<!-- ========== 首页（登录后） ========== -->
<div id="homePage" class="hidden">
    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-2xl">📝</span>
                <span class="font-bold text-lg text-primary">AI 智能作业批改</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="homeUsername" class="text-sm text-gray-600"></span>
                <button id="logoutBtn"
                        class="text-sm px-4 py-1.5 border border-gray-200 rounded-lg hover:bg-gray-50 btn-hover">
                    退出登录
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 欢迎横幅 -->
        <div class="bg-gradient-to-r from-primary to-indigo-600 rounded-2xl p-8 text-white mb-8 card-shadow">
            <h2 class="text-2xl font-bold mb-2">欢迎回来，<span id="welcomeUsername"></span>！</h2>
            <p class="text-indigo-200">使用 AI 技术快速批改作业，提高学习效率</p>
        </div>

        <!-- 功能卡片网格 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 作业批改 主入口 -->
            <div id="goToGradingBtn" class="bg-white card-shadow rounded-xl p-6 hover:scale-[1.03] smooth-transition cursor-pointer group">
                <div class="w-14 h-14 bg-primary/10 rounded-xl flex items-center justify-center mb-4 group-hover:bg-primary/20 smooth-transition">
                    <span class="text-3xl">📄</span>
                </div>
                <h3 class="text-lg font-semibold text-gray-800 mb-2">作业批改</h3>
                <p class="text-sm text-gray-500">拍照或上传作业图片，AI 自动批改并生成详细解析</p>
            </div>

            <!-- 批改记录 -->
            <div id="goToHistoryBtn" class="bg-white card-shadow rounded-xl p-6 hover:scale-[1.03] smooth-transition cursor-pointer group">
                <div class="w-14 h-14 bg-primary/10 rounded-xl flex items-center justify-center mb-4 group-hover:bg-primary/20 smooth-transition">
                    <span class="text-3xl">📊</span>
                </div>
                <h3 class="text-lg font-semibold text-gray-800 mb-2">批改记录</h3>
                <p class="text-sm text-gray-500">查看历史批改结果，回顾学习进度</p>
            </div>

            <!-- 使用帮助 -->
            <div class="bg-white card-shadow rounded-xl p-6">
                <div class="w-14 h-14 bg-blue-50 rounded-xl flex items-center justify-center mb-4">
                    <span class="text-3xl">💡</span>
                </div>
                <h3 class="text-lg font-semibold text-gray-800 mb-2">使用帮助</h3>
                <p class="text-sm text-gray-500">1. 点击「作业批改」进入<br>2. 拍照或上传作业图片<br>3. 等待 AI 批改出结果</p>
            </div>
        </div>

        <!-- 底部信息 -->
        <div class="mt-10 text-center text-sm text-gray-400">
            <p>AI 智能作业批改系统 &copy; 2026</p>
        </div>
    </div>
</div>
