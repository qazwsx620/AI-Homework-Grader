<!-- ========== 批改记录页面 ========== -->
<div id="historyPage" class="hidden">
    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-2xl">📊</span>
                <span class="font-bold text-lg text-primary">批改记录</span>
            </div>
            <button id="backFromHistoryBtn"
                    class="text-sm px-4 py-1.5 border border-gray-200 rounded-lg hover:bg-gray-50 btn-hover">
                &larr; 返回首页
            </button>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        <!-- 记录列表 -->
        <div id="historyList" class="space-y-4">
            <div id="historyEmpty" class="text-center py-16 hidden">
                <span class="text-5xl block mb-4">📭</span>
                <p class="text-lg text-gray-500">暂无批改记录</p>
                <p class="text-sm text-gray-400 mt-2">去批改一份作业看看吧</p>
            </div>
            <div id="historyLoading" class="text-center py-16">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-b-3 border-primary"></div>
                <p class="mt-4 text-gray-500">加载中...</p>
            </div>
            <div id="historyItems" class="hidden space-y-4"></div>
        </div>

        <!-- 记录详情 -->
        <div id="historyDetail" class="hidden">
            <button id="backToListBtn" class="text-sm px-4 py-1.5 border border-gray-200 rounded-lg hover:bg-gray-50 btn-hover mb-6">
                &larr; 返回列表
            </button>

            <div class="bg-white card-shadow rounded-xl overflow-hidden mb-6">
                <div class="px-5 py-4 bg-indigo-50 border-b border-indigo-100 flex justify-between items-center">
                    <div>
                        <h3 class="text-lg font-medium text-indigo-800" id="detailTitle">批改详情</h3>
                        <p class="text-sm text-indigo-500 mt-0.5" id="detailTime"></p>
                    </div>
                    <button id="deleteRecordBtn" class="text-sm px-3 py-1.5 bg-white border border-red-200 text-red-500 rounded-lg hover:bg-red-50 btn-hover">删除记录</button>
                </div>
            </div>

            <!-- 批改结果图 -->
            <div class="bg-white card-shadow rounded-xl overflow-hidden">
                <div class="px-4 py-3 bg-green-50 border-b border-green-200">
                    <h4 class="text-sm font-medium text-green-700">✅ 批改结果</h4>
                </div>
                <div class="p-4">
                    <img id="detailResultImage" src="" alt="批改结果" class="max-w-full h-auto rounded-lg shadow-sm mx-auto">
                </div>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div id="deleteConfirmMask" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center px-4">
        <div class="bg-white rounded-xl w-full max-w-sm p-6 shadow-2xl">
            <h3 class="text-lg font-semibold text-gray-800 mb-2">确认删除</h3>
            <p class="text-sm text-gray-500 mb-6">删除后无法恢复，确定要删除这条记录吗？</p>
            <div class="flex gap-3 justify-end">
                <button id="cancelDeleteBtn" class="px-4 py-2 border border-gray-200 rounded-lg hover:bg-gray-50 btn-hover text-sm">取消</button>
                <button id="confirmDeleteBtn" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 btn-hover text-sm">确认删除</button>
            </div>
        </div>
    </div>
</div>
